# Portainer - Docker container management with Traefik reverse proxy
# Access via: https://portainer.${DOMAIN_NAME}
services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    ports:
      - "9000:9000"  # HTTP access (optional, for direct access)
      - "9443:9443"  # HTTPS access (optional, for direct access)
    environment:
      - TZ=${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../docker/portainer/data:/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      
      # HTTP router (redirects to HTTPS)
      - "traefik.http.routers.portainer.entrypoints=http"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN_NAME}`)"
      - "traefik.http.routers.portainer.middlewares=portainer-https-redirect"
      - "traefik.http.middlewares.portainer-https-redirect.redirectscheme.scheme=https"
      
      # HTTPS router
      - "traefik.http.routers.portainer-secure.entrypoints=https"
      - "traefik.http.routers.portainer-secure.rule=Host(`portainer.${DOMAIN_NAME}`)"
      - "traefik.http.routers.portainer-secure.tls=true"
      - "traefik.http.routers.portainer-secure.tls.certresolver=cloudflare"
      - "traefik.http.routers.portainer-secure.service=portainer"
      - "traefik.http.routers.portainer-secure.middlewares=portainer-headers,authelia@file"
      
      # Headers middleware - Strip CSP and add permissive one
      # - "traefik.http.middlewares.portainer-headers.headers.accessControlAllowMethods=GET,OPTIONS,PUT,POST,DELETE,PATCH"
      # - "traefik.http.middlewares.portainer-headers.headers.accessControlAllowOriginList=https://portainer.${DOMAIN_NAME}"
      # - "traefik.http.middlewares.portainer-headers.headers.accessControlMaxAge=100"
      # - "traefik.http.middlewares.portainer-headers.headers.addVaryHeader=true"
      # - "traefik.http.middlewares.portainer-headers.headers.customResponseHeaders.Content-Security-Policy="
      # - "traefik.http.middlewares.portainer-headers.headers.customResponseHeaders.Permissions-Policy="
      
      # Service configuration
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      # - "traefik.http.services.portainer.loadbalancer.server.scheme=http"
      
      # Optional: Add authentication middleware
      # - "traefik.http.routers.portainer-secure.middlewares=portainer-auth"
      # - "traefik.http.middlewares.portainer-auth.basicauth.users=${PORTAINER_DASHBOARD_CREDENTIALS}"

networks:
  proxy:
    external: true
